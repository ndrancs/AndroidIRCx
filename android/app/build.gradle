apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"
apply plugin: "com.google.firebase.crashlytics"

project.ext.envConfigFiles = [
        debug  : "secrets/transifex.env",
        release: "secrets/transifex.env"
]

apply from: project(':react-native-config').projectDir.getPath() + "/dotenv.gradle"

import java.util.Properties

def repoRootDir = rootProject.projectDir.parentFile

def secretsPropsFile = new File(repoRootDir, "secrets/gradle.properties")
if (secretsPropsFile.exists()) {
    def secretsProps = new Properties()
    secretsPropsFile.withInputStream { stream -> secretsProps.load(stream) }
    secretsProps.each { key, value ->
        if (!project.hasProperty(key.toString())) {
            project.ext.set(key.toString(), value)
        }
    }
}

def googleServicesSecrets = new File(repoRootDir, "secrets/google-services.json")
def googleServicesTarget = file("google-services.json")
tasks.register("copyGoogleServices") {
    doLast {
        if (googleServicesSecrets.exists()) {
            copy {
                from googleServicesSecrets
                into project.projectDir
            }
        }
    }
}

tasks.matching { it.name.startsWith("process") && it.name.endsWith("GoogleServices") }.configureEach {
    dependsOn("copyGoogleServices")
}

def codegenStubTargets = [
    "node_modules/react-native-battery-optimization-check/android/build/generated/source/codegen/jni": "BatteryOptimizationCheck",
    "node_modules/react-native-libsodium/android/build/generated/source/codegen/jni": "Libsodium",
    "node_modules/react-native-nitro-modules/android/build/generated/source/codegen/jni": "NitroModulesSpec",
    "node_modules/react-native-sound/android/build/generated/source/codegen/jni": "RNSoundSpec",
]

tasks.register("ensureAutolinkingCodegenStubs") {
    outputs.upToDateWhen { false }
    doLast {
        def appAutolinkingDir = new File(project.buildDir, "generated/autolinking/src/main/jni")
        if (!appAutolinkingDir.exists()) {
            appAutolinkingDir.mkdirs()
        }

        codegenStubTargets.each { relativePath, libraryName ->
            def targetDir = new File(repoRootDir, relativePath)
            if (!targetDir.exists()) {
                targetDir.mkdirs()
            }
            def cmakeTargetName = "react_codegen_${libraryName}"

            def headerFile = new File(targetDir, "${libraryName}.h")
            headerFile.text = """
#pragma once

#include <memory>
#include <string>

namespace facebook::react {
class TurboModule;
class JavaTurboModule {
public:
  struct InitParams;
};

std::shared_ptr<TurboModule> ${libraryName}_ModuleProvider(
    const std::string &moduleName,
    const JavaTurboModule::InitParams &params);
} // namespace facebook::react
""".trim() + "\n"

            def appHeaderFile = new File(appAutolinkingDir, "${libraryName}.h")
            appHeaderFile.text = """
#pragma once

#include <memory>
#include <string>

#include <ReactCommon/JavaTurboModule.h>

namespace facebook::react {
std::shared_ptr<TurboModule> ${libraryName}_ModuleProvider(
    const std::string &moduleName,
    const JavaTurboModule::InitParams &params);
} // namespace facebook::react
""".trim() + "\n"

            def cppFile = new File(targetDir, "${libraryName}.cpp")
            cppFile.text = """
#include "${libraryName}.h"

namespace facebook::react {
std::shared_ptr<TurboModule> ${libraryName}_ModuleProvider(
    const std::string &moduleName,
    const JavaTurboModule::InitParams &params) {
  return nullptr;
}
} // namespace facebook::react
""".trim() + "\n"

            def cmakeFile = new File(targetDir, "CMakeLists.txt")
            cmakeFile.text = """
cmake_minimum_required(VERSION 3.13)
project(${cmakeTargetName})
add_library(${cmakeTargetName} STATIC ${libraryName}.cpp)
""".trim() + "\n"
        }
    }
}

tasks.matching { task ->
    task.name.startsWith("configureCMake") || task.name.startsWith("buildCMake") || task.name.startsWith("generateAutolinking")
}.configureEach {
    dependsOn("ensureAutolinkingCodegenStubs")
}

tasks.matching { task ->
    task.name.startsWith("configureCMake")
}.configureEach { task ->
    def reanimatedProject = project.findProject(":react-native-reanimated")
    if (reanimatedProject == null) {
        return
    }

    if (task.name.contains("Debug")) {
        task.dependsOn(":react-native-reanimated:prefabDebugPackage")
    } else {
        // RelWithDebInfo and Release variants consume release prefab artifacts.
        task.dependsOn(":react-native-reanimated:prefabReleasePackage")
    }
}

// reanimated 4.3+ uses find_package(react-native-worklets REQUIRED) at cmake configure time.
// Without an explicit Gradle dependency, parallel builds can run reanimated's cmake before
// worklets' prefab is ready, causing a race condition failure. This block ensures ordering.
rootProject.afterEvaluate {
    def workletsProject = rootProject.allprojects.find { it.name == "react-native-worklets" }
    def reanimatedProject = rootProject.allprojects.find { it.name == "react-native-reanimated" }

    if (workletsProject != null && reanimatedProject != null) {
        reanimatedProject.tasks.matching { it.name.startsWith("configureCMake") }.configureEach { t ->
            def prefabTaskName = t.name.contains("Debug") ? "prefabDebugConfigurePackage" : "prefabReleaseConfigurePackage"
            def wt = workletsProject.tasks.findByName(prefabTaskName)
            if (wt != null) {
                t.dependsOn(wt)
            }
        }
    }
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = true

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion = rootProject.ext.ndkVersion
    buildToolsVersion = rootProject.ext.buildToolsVersion
    compileSdk = rootProject.ext.compileSdkVersion

    namespace = "com.androidircx"
    defaultConfig {
        applicationId = "com.androidircx"
        minSdkVersion = rootProject.ext.minSdkVersion
        targetSdkVersion = rootProject.ext.targetSdkVersion
        versionCode = 112
        versionName = "1.9.9"

        buildConfigField "long", "PLAY_INTEGRITY_PROJECT_NUMBER", "1060587657852L"

        // Ensure all ABIs are included in the APK to prevent native lib crashes
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
        }
    }
    signingConfigs {
        debug {
            def debugKeystore = new File(repoRootDir, "secrets/debug.keystore")
            def debugStoreFile = debugKeystore.exists() ? debugKeystore : file('debug.keystore')
            storeFile debugStoreFile
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                def releaseStorePath = project.property('MYAPP_UPLOAD_STORE_FILE').toString()
                def releaseStoreFile = file(releaseStorePath)
                if (!releaseStoreFile.isAbsolute()) {
                    def secretsStoreFile = new File(repoRootDir, "secrets/${releaseStorePath}")
                    if (secretsStoreFile.exists()) {
                        releaseStoreFile = secretsStoreFile
                    }
                }
                storeFile releaseStoreFile
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            }
        }
    }
    buildTypes {
        debug {
            signingConfig = signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig = signingConfigs.release
            minifyEnabled = enableProguardInReleaseBuilds
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    // Fix for SoLoaderDSONotFoundError - ensure native libraries are included
    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
        pickFirst '**/libreactnative.so'
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libhermes.so'
        pickFirst '**/libjsc.so'
        pickFirst '**/libfbjni.so'
        pickFirst '**/libyoga.so'
        pickFirst '**/libfolly_runtime.so'
        pickFirst '**/libglog.so'
        pickFirst '**/libfolly_futures.so'
        pickFirst '**/libfolly_json.so'
        pickFirst '**/libturbomodulejsijni.so'
        pickFirst '**/libreact_nativemodule_core.so'
        pickFirst '**/libreactnativejni.so'
        pickFirst '**/libjscexecutor.so'
        pickFirst '**/libhermes_executor.so'
    }
}

def transifexPullScript = new File(repoRootDir, "scripts/transifex/pull.js")

tasks.register("transifexPull", Exec) {
    workingDir repoRootDir
    onlyIf { transifexPullScript.exists() }
    commandLine "node", transifexPullScript.absolutePath
}

preBuild.dependsOn("transifexPull")
preBuild.dependsOn("copyGoogleServices")
preBuild.dependsOn("ensureAutolinkingCodegenStubs")

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    // AndroidX Core for WindowCompat (edge-to-edge support)
    implementation("androidx.core:core-ktx:1.15.0")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
    
    // Firebase Cloud Messaging
    implementation(platform("com.google.firebase:firebase-bom:34.6.0"))
    implementation("com.google.firebase:firebase-messaging")
    implementation("com.google.firebase:firebase-appcheck")
    implementation("com.google.firebase:firebase-appcheck-playintegrity")
    implementation("com.google.firebase:firebase-analytics")
    implementation("com.google.firebase:firebase-crashlytics")
    debugImplementation("com.google.firebase:firebase-appcheck-debug")
    implementation("com.google.android.play:integrity:1.6.0")
}

// React Native Vector Icons
apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle")
