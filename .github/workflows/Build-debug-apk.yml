name: Build Debug APK and publish to Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    container:
      image: reactnativecommunity/react-native-android:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Install Node modules
        run: |
          npm ci --prefer-offline --no-audit --progress=false

      - name: Build debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon --no-configuration-cache --stacktrace

      - name: Upload APK to release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: debug-${{ github.run_id }}
          name: Debug build ${{ github.run_number }}
          body: Automated debug build for commit ${{ github.sha }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: android/app/build/outputs/apk/debug/app-debug.apk
          asset_name: app-debug.apk
          asset_content_type: application/vnd.android.package-archive
