name: Tests

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies (retry on registry errors)
        run: |
          for i in 1 2 3; do
            yarn install --frozen-lockfile --network-timeout 120000 && break
            if [ "$i" -eq 3 ]; then
              echo "yarn install failed after $i attempts"
              exit 1
            fi
            echo "yarn install failed (attempt $i), retrying in 15s..."
            sleep 15
          done

      - name: Run Prettier format check
        run: yarn format-check

      - name: Run ESLint
        run: yarn lint:ci

      - name: Run TypeScript type-check
        run: yarn type-check

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies (retry on registry errors)
        run: |
          for i in 1 2 3; do
            yarn install --frozen-lockfile --network-timeout 120000 && break
            if [ "$i" -eq 3 ]; then
              echo "yarn install failed after $i attempts"
              exit 1
            fi
            echo "yarn install failed (attempt $i), retrying in 15s..."
            sleep 15
          done

      - name: Run Jest test suite
        run: yarn test:ci

      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/master'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
