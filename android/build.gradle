buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.7.3")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        classpath("com.google.gms:google-services:4.4.4")
        classpath("com.google.firebase:firebase-crashlytics-gradle:3.0.2")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "https://notifee.github.io/maven" }
        maven { url "$rootDir/../node_modules/@notifee/react-native/android/libs" }
        maven { url "$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo" }
    }

    configurations.configureEach { configuration ->
        configuration.resolutionStrategy.eachDependency { details ->
            if (details.requested.group == "com.google.android.gms" && details.requested.name == "play-services-ads") {
                details.useVersion("25.0.0")
                details.because("Google Mobile Ads 25.4.0 is compiled with Kotlin metadata 2.3.0, while React Native 0.86 currently builds this app with Kotlin 2.1.20")
            }
        }
    }
}

apply plugin: "com.facebook.react.rootproject"
